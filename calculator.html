    <div class="container ">
        <div class="row justify-content-md-center">
            <div class="col-4">
                <div class="back container">
                    <h1>Calculator</h1>
                    <input id="firstno" type="number" placeholder="Enter first number"><br><br>
                    <span id="symbol" class="logo"></span><br>
                    <input id="secondno" type="number" placeholder="Enter second number"><br>
                    <button  class="plus" value="plus">+</button>
                    <button class="plus" value="sub">-</button>
                    <button class="plus" value="mut">x</button>
                    <button class="plus" value="div">/</button>
                    <h1 id="myresult"></h1>
                </div>
            </div>
            <div class="col-4">
                <div class="container sec">
                    <h1>Investment Calculator</h1>
                    <input id="investAmount" type="number" placeholder="Enter first number"><br><br>
                    <!-- <span id="symbol" class="logo"></span><br> -->
                    <select id="investYears">
                        <option value="1">1 Months</option>
                        <option value="2">2 Months</option>
                        <option value="3">3 Months</option>
                        <option value="4">4 Months</option>
                        <option value="5">5 Months</option>
                        <option value="6">6 Months</option>
                        <option value="7">7 Months</option>
                        <option value="8">8 Months</option>
                        <option value="9">9 Months</option>
                        <option value="10">10 Months</option>
                        <option value="11">11 Months</option>
                        <option value="12">12 Months</option>
                    </select>
                    <p><b>Note</b> Our investment rate is 20% intrest</p>
                    <button onclick="calculateInvestment()">Calculate your investment rate</button>
                    <h1 id="investResult"></h1>
                </div>
            </div>
        </div>
    </div><br><br>
    <div class="container">

                    <p><b>Note</b> Our Loan rate is 25% intrest per year</p>
