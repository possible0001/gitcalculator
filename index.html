  <script>
    let mygreet = document.getElementById("gree")
    let weekday = ['sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Frayday', 'Saturday']
    for (let i = 0; i < weekday.length; i++) {
      console.log(`Day ${i + 1}: ${weekday[i]}`)
    }

    let myhour = new Date().getHours()
    let day = new Date().getDay()

    let mysession;

    if (myhour < 12) {
      mysession = 'Morning'
    } else if (myhour < 16) {
      mysession = 'Afternoon'
    } else {
      mysession = 'evening'
    }

    if (day == 0) {
       mygreet.textContent =(`Good ${mysession}, Happy sunday`)
    } else if (day == 5) {
       mygreet.textContent =(`Good ${mysession}, TGIF`)
    } else if (day == 6) {
       mygreet.textContent =(`Good ${mysession}, Today is Saturday`)
    } else if (day >= 1 && day <= 4) {
       mygreet.textContent = (`Good ${mysession}, Today is ${weekday[day]}, Get up and work!`)
    }

  </script>
